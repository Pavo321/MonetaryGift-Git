# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/Userdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:chanlo_db}
spring.datasource.password=${DB_PASSWORD:chanlo_secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.ignore-missing-migrations=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.mysteriousmonkeys.chanlo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
logging.level.org.flywaydb=DEBUG

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Application name
spring.application.name=chanlo

# Application Base URL (for generating QR code image URLs)
app.base.url=http://localhost:8080

# WhatsApp Business API Configuration
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:942318465635256}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.business.account.id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
whatsapp.api.url=https://graph.facebook.com/v21.0
whatsapp.webhook.verify.token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:chanlo_webhook_secret_2026}
# Actual WhatsApp Business phone number for wa.me deep links (international format, no +)
whatsapp.business.phone=${WHATSAPP_BUSINESS_PHONE:919876543210}

# Dashboard Magic Link Configuration
app.base-url=${DASHBOARD_BASE_URL:http://localhost:3000}
# Link expires in 1 year (8760 hours). Host can type 'dashboard' anytime to get a new link.
app.magic-link.expiry-hours=8760
